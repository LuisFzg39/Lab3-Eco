<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delivery App – Rappi</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <header>
        <div>
            <h1>🚴 Delivery Dashboard</h1>
            <p id="userStatus">Waiting for login...</p>
        </div>
        <button id="logoutBtn" class="hidden">Logout</button>
    </header>

    <main>
        <!-- LOGIN VIEW -->
        <section id="loginView">
            <h2>Login (Delivery Rider)</h2>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Email" required />
                <input type="password" id="password" placeholder="Password" required />
                <button type="submit">Login</button>
            </form>
            <div id="loginError" style="color: red; margin-top: 10px;"></div>
        </section>

        <!-- DASHBOARD VIEW -->
        <div id="dashboardView" class="hidden">

            <section>
                <h2>My Active Deliveries</h2>
                <div id="myDeliveriesList">Loading active deliveries...</div>
            </section>

            <section>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem">
                    <h2 style="margin:0">Available Orders</h2>
                    <button id="refreshAvailableBtn" style="margin:0; background:#6c757d">Refresh</button>
                </div>
                <div id="availableList">Loading orders...</div>
            </section>

        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>

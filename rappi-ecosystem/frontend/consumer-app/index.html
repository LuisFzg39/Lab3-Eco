<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consumer App – Rappi</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header>
    <div>
      <h1>🛒 Rappi Eats</h1>
      <p id="userStatus">Hello, Guest</p>
    </div>
    <button id="logoutBtn" class="hidden">Logout</button>
  </header>

  <main>
    <!-- LOGIN VIEW -->
    <section id="loginView">
      <h2>Login (Consumer)</h2>
      <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
      <div id="loginError" style="color: red; margin-top: 10px;"></div>
    </section>

    <!-- DASHBOARD VIEW -->
    <div id="dashboardView" class="hidden">

      <section id="storesSection">
        <h2>Open Stores</h2>
        <div id="storesList">Loading open stores...</div>
      </section>

      <section id="storeDetailsSection" class="hidden">
        <button id="backToStoresBtn" style="background:#555;">&larr; Back to Stores</button>
        <h2 id="currentStoreName">Store Name</h2>
        <div id="productsList">Loading products...</div>
      </section>

      <section class="cart-box">
        <h2>My Cart</h2>
        <div id="cartList">Cart is empty.</div>
        <button id="checkoutBtn" class="hidden"
          style="width:100%; margin-top:1rem; padding:1rem; font-size:1.1rem;">Place Order</button>
      </section>

      <section>
        <h2>My Recent Orders</h2>
        <div id="ordersHistoryList">Loading orders...</div>
      </section>

    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>

</html>
